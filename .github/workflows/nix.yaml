name: "Build and Cache"
on:
  push:
    branches: [main]
    paths:
      - "**.nix"
      - "flake.lock"
      - "**/facter.json"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix flake check --accept-flake-config

  build:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Free up disk space (Native)
        run: |
          df -h /

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

          df -h /

      - uses: cachix/cachix-action@v17
        with:
          name: push-and-pray-config
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build Host
        run: |
          nix build \
            .#nixosConfigurations.zeus.config.system.build.toplevel \
            .#nixosConfigurations.ares.config.system.build.toplevel \
            .#nixosConfigurations.hermes.config.system.build.toplevel \
            --accept-flake-config
